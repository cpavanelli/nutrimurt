services:
  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Clerk__Authority: https://clerk.nutrimurt.com.br

  pyservice:
    environment:
      ENV: production
      WEBSITE_URL: https://nutrimurt.com.br
      CLERK_ISSUER: https://clerk.nutrimurt.com.br
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
      MAILGUN_FROM: ${MAILGUN_FROM}

  gateway:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nutrimurt.Web/dist:/usr/share/nginx/html:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  certbot_www:
  certbot_certs:
