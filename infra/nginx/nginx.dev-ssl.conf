events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=public_answer:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=save_answer:10m rate=5r/s;

  upstream nutrimurt_api { server api:8080; }
  upstream nutrimurt_py  { server pyservice:8000; }

  # Docker embedded DNS
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  # Redirect HTTP to HTTPS
  server {
    listen 80;
    server_name _;

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS server
  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.clerk.accounts.dev https://clerk.nutrimurt.com.br; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.clerk.accounts.dev https://clerk.nutrimurt.com.br https://img.clerk.com; connect-src 'self' https://*.clerk.accounts.dev https://clerk.nutrimurt.com.br; worker-src 'self' blob:; frame-src 'self' https://*.clerk.accounts.dev https://clerk.nutrimurt.com.br;" always;

    # React SPA (static files)
    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets — cache aggressively
    location /assets/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # SPA fallback — never cache index.html
    location / {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      try_files $uri $uri/ /index.html;
    }

    # .NET API behind /api
    location /api/ {
      proxy_pass http://nutrimurt_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate-limited public answer endpoint
    location /py/answer/public/ {
      limit_req zone=public_answer burst=20 nodelay;
      proxy_pass http://nutrimurt_py;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate-limited save endpoints
    location /py/savePatientAnswers {
      limit_req zone=save_answer burst=10 nodelay;
      proxy_pass http://nutrimurt_py;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /py/savePatientDiary {
      limit_req zone=save_answer burst=10 nodelay;
      proxy_pass http://nutrimurt_py;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Python service behind /py
    location /py/ {
      proxy_pass http://nutrimurt_py;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
