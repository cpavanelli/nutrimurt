events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=public_answer:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=save_answer:10m rate=5r/s;

  upstream nutrimurt_api { server api:8080; }
  upstream nutrimurt_py  { server pyservice:8000; }

  # Docker embedded DNS
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  # Redirect all HTTP to HTTPS
  server {
    listen 80;
    server_name nutrimurt.com.br;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS server
  server {
    listen 443 ssl;
    server_name nutrimurt.com.br;

    ssl_certificate     /etc/letsencrypt/live/nutrimurt.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nutrimurt.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://clerk.nutrimurt.com.br https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://clerk.nutrimurt.com.br https://img.clerk.com https://www.gstatic.com; connect-src 'self' https://clerk.nutrimurt.com.br https://www.google.com; worker-src 'self' blob:; frame-src 'self' https://clerk.nutrimurt.com.br https://www.google.com https://recaptcha.google.com;" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    location /api/ {
      proxy_pass http://nutrimurt_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /py/answer/public/ {
      limit_req zone=public_answer burst=20 nodelay;
      proxy_pass http://nutrimurt_py;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /py/savePatientAnswers {
      limit_req zone=save_answer burst=10 nodelay;
      proxy_pass http://nutrimurt_py;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /py/savePatientDiary {
      limit_req zone=save_answer burst=10 nodelay;
      proxy_pass http://nutrimurt_py;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /py/ {
      proxy_pass http://nutrimurt_py;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
